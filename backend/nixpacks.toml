# Railway 部署构建配置(Nixpacks)
# 文档: https://nixpacks.com/docs/configuration/file

# ===== 安装阶段:安装 Python 依赖 =====
[phases.install]
cmds = ["pip install --no-cache-dir -r requirements.txt"]

# ===== 启动命令 =====
# Railway 会注入 $PORT 环境变量,必须监听该端口
# 注意:不加 --reload(生产环境不需要热重载)
[start]
cmd = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
